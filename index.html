<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Mini Social</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <h1 class="logo">Mini Social</h1>
</header>

<main class="feed">

  <article class="post">
    <div class="post-header">
      <img src="assets/gg.png" class="avatar">
      <div>
        <span class="name">Wesker</span>
        <span class="username">@albertcode</span>
      </div>
    </div>

    <p class="post-text">
       Seven Minutes. Seven Minutes is all I can spare to play with you now
    </p>

   <div class="post-actions">
      <button id="likeBtn">Curtir</button>
      <span id="likeCount">0</span>
      <button id="dislikeBtn">Descurtir</button>
      <span id="dislikeCount">0</span>
    </div>

   
    <section class="comments">
      <div class="comment">
        <img src="assets/shadow.png" class="avatar-small">
        <p>vila do xá</p>
      </div>

      <div class="comment">
        <img src="assets/subaru2.png" class="avatar-small">
        <p>eu tenho varias armas</p>
      </div>
    </section>

  </article>

</main>

<script src="js/script.js"></script>
</body>
</html>
